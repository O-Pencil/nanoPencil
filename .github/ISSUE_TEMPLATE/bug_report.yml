name: Bug Report
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to report this bug! Please fill out the details below.

        ** IMPORTANT **
        Before submitting:
        - Search existing issues to avoid duplicates
        - Ensure you're using the latest version
        - This is a **bug report**, not a support request

  - type: dropdown
    id: version
    attributes:
      label: NanoPencil Version
      description: Which version of NanoPencil are you using?
      options:
        - latest (1.x.x)
        - 1.10.x
        - 1.9.x
        - older
        - develop/nightly
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running NanoPencil on?
      options:
        - Windows
        - macOS
        - Linux
        - Other (please specify below)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of `node --version`"
      placeholder: "e.g., v20.15.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: |
        Describe what happened:
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "As a user, I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "But instead, I got..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Numbered steps to reproduce the bug"
      placeholder: |
        1. Run `nanopencil`
        2. Execute `/model qwen-max`
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Messages
      description: "Paste any relevant error output (avoid sensitive info)"
      placeholder: |
        ```
        error message here
        ```
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (environment, config, etc.)
      placeholder: |
        - Config file: ~/.nanopencil/config.json
        - Model: qwen-max
        - ...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: |
        Please confirm the following:
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/O-Pencil/nanoPencil/blob/main/CODE_OF_CONDUCT.md)
          required: true
