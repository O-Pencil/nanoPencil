name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Have an idea to improve NanoPencil? We'd love to hear it!

        ** IMPORTANT **
        - Search existing issues to avoid duplicates
        - Check if the feature aligns with NanoPencil's vision:
          - Persistent memory for projects
          - AI personality evolution
          - Terminal-native TUI experience
          - Multi-model support

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: Brief one-line description of the feature
      placeholder: "A clear, concise summary of the feature"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: "What problem does this solve? Who would benefit?"
      placeholder: |
        As a [type of user], I want [goal] so that [benefit].
        - This would help with...
        - Currently, I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Describe the implementation approach
      placeholder: |
        The feature could work like this:
        1. ...
        2. ...
        Or by adding a new command like `/feature`:
        - Input: ...
        - Output: ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered?
      placeholder: "I considered using /alternative but..."
    validations:
      required: false

  - type: textarea
    id: mockup
    attributes:
      label: Mockups / Examples
      description: Wireframes, screenshots, or examples (optional)
      placeholder: |
        ```
        [ASCII mockup or description of UI]
        ```
    validations:
      required: false

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes
      description: Any considerations about backwards compatibility or migration?
      placeholder: |
        - New config keys needed: ...
        - Breaking changes: ...
        - Related to existing feature: ...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: |
        Please confirm the following:
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com-O-Pencil/nanoPencil/blob/main/CODE_OF_CONDUCT.md)
          required: true
