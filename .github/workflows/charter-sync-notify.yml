# Charter Sync Notification
#
# When docs/pencil-platform-charter.md changes on main, open a tracking issue
# in each application repo so maintainers can verify their charter-pointer
# documents are still aligned.
#
# Setup (one-time):
#   1. Create a fine-grained PAT with `issues:write` (and `metadata:read`)
#      scoped to the 5 target repos below.
#   2. Add it to this repo's secrets as `CHARTER_SYNC_TOKEN`.
#      Settings -> Secrets and variables -> Actions -> New repository secret.
#   3. (Optional) Pre-create a `charter-sync` label in each target repo;
#      otherwise this workflow creates it on first run.
#
# Opt-out:
#   Commit messages containing `[skip-charter-sync]` will NOT trigger
#   notifications. Use for typo fixes, whitespace, link rot, etc.
#
# Manual run:
#   workflow_dispatch lets you re-fire the notification from the Actions tab
#   (uses the latest commit on main).

name: Charter Sync Notification

on:
  push:
    branches: [main]
    paths:
      - 'docs/pencil-platform-charter.md'
  workflow_dispatch: {}

# Avoid duplicate runs when multiple commits land within a window.
concurrency:
  group: charter-sync
  cancel-in-progress: false

jobs:
  notify:
    name: Notify ${{ matrix.repo }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo:
          - O-Pencil/Pencil-Agent-Gateway
          - O-Pencil/catui-editor
          - O-Pencil/Asgard-platform
          - O-Pencil/Asgard-api
          - O-Pencil/Asgard-web

    steps:
      - name: Verify CHARTER_SYNC_TOKEN is configured
        env:
          TOKEN: ${{ secrets.CHARTER_SYNC_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::warning::CHARTER_SYNC_TOKEN secret is not set. Skipping notifications."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        id: gate

      - name: Checkout (fetch-depth 2 to diff against parent)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Opt-out check
        if: steps.gate.outputs.skip != 'true'
        id: optout
        run: |
          MSG=$(git log -1 --pretty=format:'%B' HEAD)
          if echo "${MSG}" | grep -q '\[skip-charter-sync\]'; then
            echo "Found [skip-charter-sync] marker; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build change summary
        if: steps.gate.outputs.skip != 'true' && steps.optout.outputs.skip != 'true'
        id: summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/sync
          {
            echo "**Commit**: [\`$(git rev-parse --short HEAD)\`](${REPO_URL}/commit/${COMMIT_SHA})"
            echo ""
            echo "**Subject**: $(git log -1 --pretty=format:'%s' HEAD)"
            echo ""
            BODY=$(git log -1 --pretty=format:'%b' HEAD | head -20)
            if [ -n "${BODY}" ]; then
              echo "**Body (first 20 lines)**:"
              echo ""
              echo '```'
              echo "${BODY}"
              echo '```'
              echo ""
            fi
            echo "**Sections touched in this commit** (from diff against parent):"
            echo ""
            echo '```'
            git diff "HEAD^" HEAD -- docs/pencil-platform-charter.md \
              | grep -E '^[+-]## |^[+-]### ' \
              | head -20 \
              || echo "(no section heading changes; body-only edit)"
            echo '```'
          } > /tmp/sync/diff-summary.md

      - name: Compose issue body
        if: steps.gate.outputs.skip != 'true' && steps.optout.outputs.skip != 'true'
        id: body
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "The platform charter at \`catui/docs/pencil-platform-charter.md\` was just updated."
            echo ""
            echo "## What changed"
            echo ""
            cat /tmp/sync/diff-summary.md
            echo ""
            echo "## Why you're seeing this"
            echo ""
            echo "This repository contains pointers (banners, references, glossary stubs) into the platform charter. Per charter §10.1 (\`修改流程\`) and §10.2 (\`防止重复\`), every charter change requires the application repos that quote it to verify their pointers remain accurate."
            echo ""
            echo "## What to do"
            echo ""
            echo "- [ ] Open the charter at the new commit and skim §2 / §4 / §6 / §7 / §8 for anything this repo references"
            echo "- [ ] If a pointer needs to update wording (not just a link), file a PR in this repo"
            echo "- [ ] If you find a charter mistake while reviewing, file a PR in **catui**, not here"
            echo "- [ ] Close this issue when verification is done"
            echo ""
            echo "## Links"
            echo ""
            echo "- Charter (HEAD): ${REPO_URL}/blob/main/docs/pencil-platform-charter.md"
            echo "- Commit: ${REPO_URL}/commit/${{ github.sha }}"
            echo "- Charter §10.3 (this workflow rationale): ${REPO_URL}/blob/main/docs/pencil-platform-charter.md#103-同步检测"
            echo ""
            echo "---"
            echo "*Automated by catui/.github/workflows/charter-sync-notify.yml. Add \`[skip-charter-sync]\` to a charter commit message to suppress future notifications.*"
          } > /tmp/sync/issue-body.md

      - name: Ensure charter-sync label exists in target repo
        if: steps.gate.outputs.skip != 'true' && steps.optout.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CHARTER_SYNC_TOKEN }}
        run: |
          # Idempotent: creating an existing label returns a non-zero we swallow.
          gh label create "charter-sync" \
            --color "FFCC00" \
            --description "Triggered by catui platform charter update" \
            -R "${{ matrix.repo }}" 2>/dev/null || true

      - name: Create tracking issue in ${{ matrix.repo }}
        if: steps.gate.outputs.skip != 'true' && steps.optout.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CHARTER_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          SUBJECT=$(git log -1 --pretty=format:'%s' HEAD | head -c 80)
          gh issue create \
            -R "${{ matrix.repo }}" \
            --title "[charter-sync] ${SUBJECT}" \
            --label "charter-sync" \
            --body-file /tmp/sync/issue-body.md
