name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: true

      - name: Run type check
        run: npx tsc --noEmit
        env:
          CI: true

      - name: Verify DIP documentation map
        run: npm run verify:dip
        env:
          CI: true

      - name: Verify package boundary (BR01, dist embed resolves)
        run: npm run verify:package-boundary:dist
        env:
          CI: true

      - name: Run dev-loop tests
        run: npm run test:dev-loop
        env:
          CI: true

      - name: Run security boundary tests
        run: npm run test:security
        env:
          CI: true

      - name: Run slash command catalog tests
        run: npm run test:commands
        env:
          CI: true

      - name: Run tool boundary tests
        run: npm run test:tools
        env:
          CI: true

  # Optional: Run package-specific tests
  packages-test:
    name: Test Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sub-packages
        run: npm run build:deps

      - name: Run agent-core tests
        run: npm test --workspace=core/lib/agent-core

      - name: Run ai tests
        run: npm test --workspace=core/lib/ai
